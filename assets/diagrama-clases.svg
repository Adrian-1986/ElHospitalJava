<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="1040" viewBox="0 0 1320 1040">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f2f2f2" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1320" height="1040" fill="#1b1b1f" />

  <!-- Class boxes -->
  <rect x="200" y="40" width="280" height="165" rx="10" ry="10" fill="#1f1f24" stroke="#f2f2f2" stroke-width="1.4" />
  <rect x="40" y="300" width="260" height="140" rx="10" ry="10" fill="#1f1f24" stroke="#f2f2f2" stroke-width="1.4" />
  <rect x="380" y="300" width="260" height="160" rx="10" ry="10" fill="#1f1f24" stroke="#f2f2f2" stroke-width="1.4" />
  <rect x="40" y="520" width="300" height="200" rx="10" ry="10" fill="#1f1f24" stroke="#f2f2f2" stroke-width="1.4" />
  <rect x="40" y="780" width="300" height="200" rx="10" ry="10" fill="#1f1f24" stroke="#f2f2f2" stroke-width="1.4" />
  <rect x="380" y="520" width="300" height="200" rx="10" ry="10" fill="#1f1f24" stroke="#f2f2f2" stroke-width="1.4" />
  <rect x="380" y="780" width="300" height="200" rx="10" ry="10" fill="#1f1f24" stroke="#f2f2f2" stroke-width="1.4" />

  <!-- Interface boxes -->
  <rect x="740" y="520" width="260" height="200" rx="10" ry="10" fill="#1f1f24" stroke="#f2f2f2" stroke-width="1.4" />
  <rect x="740" y="780" width="260" height="200" rx="10" ry="10" fill="#1f1f24" stroke="#f2f2f2" stroke-width="1.4" />
  <rect x="1040" y="520" width="260" height="200" rx="10" ry="10" fill="#1f1f24" stroke="#f2f2f2" stroke-width="1.4" />
  <rect x="1040" y="780" width="260" height="200" rx="10" ry="10" fill="#1f1f24" stroke="#f2f2f2" stroke-width="1.4" />

  <!-- Inheritance lines -->
  <line x1="170" y1="300" x2="340" y2="205" stroke="#f2f2f2" stroke-width="1.4" marker-end="url(#arrow)" />
  <line x1="510" y1="300" x2="340" y2="205" stroke="#f2f2f2" stroke-width="1.4" marker-end="url(#arrow)" />
  <line x1="190" y1="520" x2="170" y2="440" stroke="#f2f2f2" stroke-width="1.4" marker-end="url(#arrow)" />
  <line x1="190" y1="780" x2="170" y2="440" stroke="#f2f2f2" stroke-width="1.4" marker-end="url(#arrow)" />
  <line x1="530" y1="520" x2="510" y2="460" stroke="#f2f2f2" stroke-width="1.4" marker-end="url(#arrow)" />
  <line x1="530" y1="780" x2="510" y2="460" stroke="#f2f2f2" stroke-width="1.4" marker-end="url(#arrow)" />

  <!-- Implements lines -->
  <line x1="340" y1="620" x2="740" y2="620" stroke="#f2f2f2" stroke-width="1.4" stroke-dasharray="6,5" marker-end="url(#arrow)" />
  <line x1="340" y1="880" x2="740" y2="880" stroke="#f2f2f2" stroke-width="1.4" stroke-dasharray="6,5" marker-end="url(#arrow)" />
  <line x1="680" y1="620" x2="1040" y2="620" stroke="#f2f2f2" stroke-width="1.4" stroke-dasharray="6,5" marker-end="url(#arrow)" />
  <line x1="680" y1="880" x2="1040" y2="880" stroke="#f2f2f2" stroke-width="1.4" stroke-dasharray="6,5" marker-end="url(#arrow)" />

  <!-- Text: Character -->
  <text x="210" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#f2f2f2">Character (abstract)</text>
  <text x="210" y="76" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Attributes:</text>
  <text x="210" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">- fullName: String</text>
  <text x="210" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">- age: int</text>
  <text x="210" y="124" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Methods:</text>
  <text x="210" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ getters / setters</text>

  <!-- Text: Doctor -->
  <text x="50" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#f2f2f2">Doctor (abstract)</text>
  <text x="50" y="336" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Attributes:</text>
  <text x="50" y="352" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">- licenseId: String</text>
  <text x="50" y="368" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Methods:</text>
  <text x="50" y="384" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ getters / setters</text>

  <!-- Text: Patient -->
  <text x="390" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#f2f2f2">Patient (abstract)</text>
  <text x="390" y="336" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Attributes:</text>
  <text x="390" y="352" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">- condition: String</text>
  <text x="390" y="368" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">- roomNumber: String</text>
  <text x="390" y="384" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Methods:</text>
  <text x="390" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ getters / setters</text>

  <!-- Text: SpecialistDoctor -->
  <text x="50" y="540" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#f2f2f2">SpecialistDoctor</text>
  <text x="50" y="556" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Attributes:</text>
  <text x="50" y="572" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">- weeklyWorkHours: int</text>
  <text x="50" y="588" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">- vacationDaysPerYear: int</text>
  <text x="50" y="604" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">- specialty: String</text>
  <text x="50" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Methods:</text>
  <text x="50" y="636" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ interface methods</text>

  <!-- Text: StudentDoctor -->
  <text x="50" y="800" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#f2f2f2">StudentDoctor</text>
  <text x="50" y="816" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Attributes:</text>
  <text x="50" y="832" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">- weeklyWorkHours: int</text>
  <text x="50" y="848" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">- weeklyStudyHours: int</text>
  <text x="50" y="864" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">- currentCourse: String</text>
  <text x="50" y="880" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Methods:</text>
  <text x="50" y="896" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ interface methods</text>

  <!-- Text: AmbulancePatient -->
  <text x="390" y="540" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#f2f2f2">AmbulancePatient</text>
  <text x="390" y="556" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Attributes:</text>
  <text x="390" y="572" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">- injuryType: String</text>
  <text x="390" y="588" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Methods:</text>
  <text x="390" y="604" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ interface methods</text>

  <!-- Text: ConsultationPatient -->
  <text x="390" y="800" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#f2f2f2">ConsultationPatient</text>
  <text x="390" y="816" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Attributes:</text>
  <text x="390" y="832" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">- (none)</text>
  <text x="390" y="848" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Methods:</text>
  <text x="390" y="864" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ interface methods</text>

  <!-- Interfaces -->
  <text x="750" y="540" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#f2f2f2">SpecialistDuties (interface)</text>
  <text x="750" y="556" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Methods:</text>
  <text x="750" y="572" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ weeklyWorkHours(): int</text>
  <text x="750" y="588" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ eat(): String</text>
  <text x="750" y="604" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ vacationDaysPerYear(): int</text>
  <text x="750" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ specialty(): String</text>

  <text x="750" y="800" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#f2f2f2">StudentDuties (interface)</text>
  <text x="750" y="816" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Methods:</text>
  <text x="750" y="832" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ weeklyWorkHours(): int</text>
  <text x="750" y="848" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ weeklyStudyHours(): int</text>
  <text x="750" y="864" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ eat(): String</text>
  <text x="750" y="880" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ currentCourse(): String</text>

  <text x="1050" y="540" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#f2f2f2">AmbulanceFlow (interface)</text>
  <text x="1050" y="556" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Methods:</text>
  <text x="1050" y="572" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ admission(): String</text>
  <text x="1050" y="588" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ operation(): String</text>
  <text x="1050" y="604" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ roomAssignment(): String</text>
  <text x="1050" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ treatment(): String</text>
  <text x="1050" y="636" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ rehabilitation(): String</text>
  <text x="1050" y="652" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ discharge(): String</text>

  <text x="1050" y="800" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="bold" fill="#f2f2f2">ConsultationFlow (interface)</text>
  <text x="1050" y="816" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">Methods:</text>
  <text x="1050" y="832" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ admission(): String</text>
  <text x="1050" y="848" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ nurseCheck(): String</text>
  <text x="1050" y="864" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ roomAssignment(): String</text>
  <text x="1050" y="880" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ treatment(): String</text>
  <text x="1050" y="896" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ nextAppointment(): String</text>
  <text x="1050" y="912" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#f2f2f2">+ discharge(): String</text>
</svg>
